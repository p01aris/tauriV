  <rect x="1082" y="292" width="262" height="68" rx="12" fill="#061323B3" stroke="#91C6EE33"/>
  <text x="1100" y="330" class="small">No errors. Compile is clean.</text>

  <text x="1082" y="392" class="label">VERILOG</text>
  <rect x="1082" y="404" width="262" height="180" rx="12" fill="#041122E6" stroke="#91C6EE33"/>
  <text x="1098" y="436" class="code">module TopLevelModule(...);</text>
  <text x="1098" y="462" class="code">assign out_0 = in_0 &amp; in_1;</text>
  <text x="1098" y="488" class="code">endmodule</text>

  <text x="1082" y="620" class="label">SIMULATION LOG</text>
  <rect x="1082" y="632" width="262" height="138" rx="12" fill="#041122E6" stroke="#91C6EE33"/>
  <text x="1098" y="664" class="code"># 10 in_0 = 1</text>
  <text x="1098" y="690" class="code"># 20 in_0 = 0</text>
  <text x="1098" y="716" class="code">Simulation finished.</text>
</svg>
