  <text x="72" y="613" class="text">▾ Built-in Library (4)</text>
  <text x="92" y="640" class="small">+ Input</text>
  <text x="92" y="665" class="small">+ Output</text>
  <text x="92" y="690" class="small">+ AndGate</text>
  <text x="92" y="715" class="small">+ OrGate</text>
