<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#18395C"/>
      <stop offset="0.5" stop-color="#0F243B"/>
      <stop offset="1" stop-color="#08121F"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#16324F" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#0B1828" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="nodeFill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#18384A"/>
      <stop offset="1" stop-color="#0B1B2D"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 38px "Space Grotesk", "Segoe UI", sans-serif; fill: #E9F6FF; }
      .subtitle { font: 500 18px "Space Grotesk", "Segoe UI", sans-serif; fill: #9FC2E2; }
      .panel-title { font: 700 18px "Space Grotesk", "Segoe UI", sans-serif; fill: #DDF0FF; letter-spacing: 0.08em; }
      .label { font: 600 13px "Space Grotesk", "Segoe UI", sans-serif; fill: #8FB2D2; letter-spacing: 0.08em; }
      .text { font: 500 15px "Space Grotesk", "Segoe UI", sans-serif; fill: #D7ECFF; }
      .code { font: 500 14px "IBM Plex Mono", "Menlo", monospace; fill: #BDE7FF; }
      .small { font: 500 12px "Space Grotesk", "Segoe UI", sans-serif; fill: #86AACE; }
    </style>
  </defs>

  <rect width="1400" height="820" rx="0" fill="url(#bg)"/>

  <g opacity="0.45">
    <circle cx="80" cy="90" r="2" fill="#4EA2D8"/>
    <circle cx="180" cy="150" r="2" fill="#4EA2D8"/>
    <circle cx="310" cy="100" r="2" fill="#4EA2D8"/>
    <circle cx="430" cy="170" r="2" fill="#4EA2D8"/>
    <circle cx="560" cy="90" r="2" fill="#4EA2D8"/>
    <circle cx="680" cy="145" r="2" fill="#4EA2D8"/>
    <circle cx="840" cy="95" r="2" fill="#4EA2D8"/>
    <circle cx="980" cy="160" r="2" fill="#4EA2D8"/>
    <circle cx="1120" cy="105" r="2" fill="#4EA2D8"/>
    <circle cx="1260" cy="165" r="2" fill="#4EA2D8"/>
  </g>

  <rect x="28" y="24" width="1344" height="100" rx="16" fill="url(#panel)" stroke="#77A9D31A" stroke-width="2"/>
  <text x="56" y="76" class="title">Flow Verilog Studio</text>
  <text x="56" y="104" class="subtitle">Design Logic Visually, Compile Hardware Reliably.</text>

  <rect x="28" y="140" width="1344" height="52" rx="12" fill="#0A1A2DCC" stroke="#77A9D33D" stroke-width="2"/>
