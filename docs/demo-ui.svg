  <line x1="438" y1="460" x2="726" y2="460" stroke="#8BCDF633"/>
  <text x="474" y="374" class="title" font-size="22">input_5</text>
  <text x="612" y="440" class="text">Out</text>
  <rect x="652" y="412" width="56" height="34" rx="17" fill="#0A2A42" stroke="#5CA8DEA6"/>
  <text x="668" y="435" class="code">1b</text>
  <circle cx="726" cy="428" r="13" fill="#8CFCE7" filter="url(#softGlow)"/>
  <circle cx="726" cy="428" r="10" fill="#43D9B8"/>
  <circle cx="726" cy="428" r="6" fill="#B8FFF2" opacity="0.85"/>

  <rect x="470" y="482" width="224" height="42" rx="13" fill="#041021D9" stroke="#6FB4E466"/>
