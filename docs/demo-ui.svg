  <path d="M739 428 C 810 428, 838 526, 902 526" stroke="#41D59C" stroke-width="8" stroke-linecap="round" stroke-dasharray="16 14"/>
  <polygon points="904,526 878,538 878,514" fill="#5ED29C"/>

  <rect x="846" y="340" width="130" height="86" rx="14" fill="#0D2035" stroke="#6AA4D5AA"/>
  <text x="874" y="372" class="small">AND</text>
  <circle cx="862" cy="372" r="8" fill="#61E5C8"/>
  <circle cx="862" cy="394" r="8" fill="#61E5C8"/>
  <circle cx="962" cy="383" r="8" fill="#61E5C8"/>

  <rect x="1054" y="208" width="318" height="584" rx="16" fill="url(#panel)" stroke="#77A9D33D" stroke-width="2"/>
  <text x="1082" y="246" class="panel-title">OUTPUT</text>

